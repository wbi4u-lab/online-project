<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[교컴] 수업시간표 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f6fa;
  --surface: #ffffff;
  --surface2: #f0f2f8;
  --border: #dde1ec;
  --border-light: #e8ebf5;
  --text: #1e2240;
  --text-dim: #6b7194;
  --text-faint: #b0b5cc;
  --accent: #3d5afe;
  --accent-light: #e8ecff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: 272px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 28px 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.brand {
  border-bottom: 1px solid var(--border-light);
  padding-bottom: 20px;
}
.brand .tag {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  margin-bottom: 8px;
}
.brand h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 17px;
  font-weight: 700;
  line-height: 1.4;
  color: var(--text);
}

.s-section { display: flex; flex-direction: column; gap: 10px; }
.s-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-faint);
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-light);
}

.s-input {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 10px;
  border-radius: 6px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.s-input:focus { border-color: var(--accent); background: #fff; }

.s-row-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.period-times { display: flex; flex-direction: column; gap: 6px; }
.period-row {
  display: grid;
  grid-template-columns: 28px 1fr 1fr;
  gap: 5px;
  align-items: center;
}
.period-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  text-align: center;
  font-weight: 500;
}
.time-input {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 6px;
  border-radius: 5px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
.time-input:focus { border-color: var(--accent); }

.legend { display: flex; flex-direction: column; gap: 6px; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-dim);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.btn {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
  text-align: center;
}
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: #2a45e8; }
.btn-ghost {
  background: var(--surface2);
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }
.btn-group { display: flex; flex-direction: column; gap: 8px; }

/* ─── MAIN ─── */
.main {
  flex: 1;
  padding: 32px 36px;
  overflow: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.timetable-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(61,90,254,0.06);
}

.tt-header {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: baseline;
  gap: 14px;
  background: linear-gradient(135deg, #f7f9ff 0%, #ffffff 100%);
}
.tt-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}
.tt-meta {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
}

.tt-wrap { padding: 20px 28px; overflow-x: auto; }

table.timetable {
  width: 100%;
  border-collapse: separate;
  border-spacing: 4px;
  min-width: 500px;
}

table.timetable th {
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  padding: 10px 6px;
}
table.timetable th.day-head {
  color: var(--accent);
  background: var(--accent-light);
  border-radius: 6px;
  padding: 9px 6px;
}
table.timetable th.period-head {
  font-family: 'DM Mono', monospace;
  color: var(--text-faint);
  font-size: 10px;
  width: 76px;
}

table.timetable td { padding: 2px; vertical-align: top; }
table.timetable td.period-info {
  padding: 6px 8px;
  text-align: center;
  background: var(--surface2);
  border-radius: 6px;
  vertical-align: middle;
  min-width: 70px;
}
.period-label {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  display: block;
}
.period-time {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text-faint);
  display: block;
  margin-top: 3px;
  line-height: 1.7;
}

.cell-inner {
  position: relative;
  height: 68px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  overflow: hidden;
}
.cell-inner.empty {
  background: var(--surface2);
  border: 1.5px dashed var(--border);
}
.cell-inner.empty:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.cell-inner.empty:hover .add-icon { opacity: 1; color: var(--accent); }
.add-icon {
  font-size: 22px;
  color: var(--text-faint);
  opacity: 0;
  transition: opacity 0.15s;
  font-weight: 300;
}
.cell-inner.filled {
  flex-direction: column;
  padding: 6px 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.cell-inner.filled:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0,0,0,0.13);
}
.subject-name {
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  line-height: 1.3;
  word-break: keep-all;
}
.cell-del {
  position: absolute;
  top: 4px; right: 5px;
  font-size: 11px;
  opacity: 0;
  transition: opacity 0.1s;
  cursor: pointer;
}
.cell-inner.filled:hover .cell-del { opacity: 0.6; }
.cell-del:hover { opacity: 1 !important; }

/* ─── MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(30,34,64,0.28);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  width: 340px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  box-shadow: 0 8px 40px rgba(61,90,254,0.12);
  animation: fadeUp 0.18s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:none; }
}
.modal h3 {
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.modal-context {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
}
.modal-field { display: flex; flex-direction: column; gap: 5px; }
.modal-label {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
}
.modal-input {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 7px;
  outline: none;
  width: 100%;
  transition: border-color 0.15s, background 0.15s;
}
.modal-input:focus { border-color: var(--accent); background: #fff; }

.color-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}
.color-opt {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 6px;
  cursor: pointer;
  border: 2.5px solid transparent;
  transition: transform 0.1s, border-color 0.1s;
}
.color-opt:hover { transform: scale(1.12); }
.color-opt.selected { border-color: #333; }

.modal-btns { display: flex; gap: 10px; }
.modal-btn {
  flex: 1;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 10px;
  border: none;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.15s;
}
.modal-btn-ok { background: var(--accent); color: #fff; }
.modal-btn-ok:hover { background: #2a45e8; }
.modal-btn-cancel {
  background: var(--surface2);
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.modal-btn-cancel:hover { color: var(--text); }

/* ─── PRINT ─── */
@media print {
  body { background: white; }
  .sidebar { display: none; }
  .app { display: block; }
  .main { padding: 0; }
  .timetable-card { border: none; box-shadow: none; border-radius: 0; }
  .tt-header { background: none; }
  .cell-del, .add-icon { display: none; }
}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="brand">
    <div class="tag">[교컴] 교사 업무 도우미</div>
    <h1>수업 시간표<br>생성기</h1>
  </div>

  <div class="s-section">
    <div class="s-label">학급 정보</div>
    <input class="s-input" id="schoolName" placeholder="학교명" oninput="updateHeader()">
    <input class="s-input" id="className" placeholder="학급 (예: 3학년 2반)" oninput="updateHeader()">
    <input class="s-input" id="teacherName" placeholder="담임 교사" oninput="updateHeader()">
    <input class="s-input" id="semester" placeholder="학기 (예: 2026학년도 1학기)" oninput="updateHeader()">
  </div>

  <div class="s-section">
    <div class="s-label">시간표 구성</div>
    <div>
      <div class="s-row-label">수업 일수</div>
      <select class="s-input" id="dayCount" onchange="buildGrid()">
        <option value="5">5일 (월~금)</option>
        <option value="6">6일 (월~토)</option>
      </select>
    </div>
    <div>
      <div class="s-row-label">교시 수</div>
      <select class="s-input" id="periodCount" onchange="buildGrid()">
        <option value="6">6교시</option>
        <option value="7" selected>7교시</option>
        <option value="8">8교시</option>
      </select>
    </div>
  </div>

  <div class="s-section">
    <div class="s-label">교시별 시간</div>
    <div class="period-times" id="periodTimes"></div>
  </div>

  <div class="s-section">
    <div class="s-label">과목 현황</div>
    <div class="legend" id="legend">
      <div style="font-size:11px;color:var(--text-faint);">셀을 클릭해 과목을 입력하세요</div>
    </div>
  </div>

  <div class="s-section">
    <div class="s-label">내보내기</div>
    <div class="btn-group">
      <button class="btn btn-accent" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
      <button class="btn btn-ghost" onclick="clearAll()">초기화</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="timetable-card">
    <div class="tt-header">
      <div class="tt-title" id="ttTitle">수업 시간표</div>
      <div class="tt-meta" id="ttMeta"></div>
    </div>
    <div class="tt-wrap">
      <table class="timetable" id="timetable"></table>
    </div>
  </div>
</main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div>
      <h3>과목 입력</h3>
      <div class="modal-context" id="modalContext"></div>
    </div>
    <div class="modal-field">
      <div class="modal-label">과목명</div>
      <input class="modal-input" id="modalSubject" placeholder="예: 국어, 수학, 체육…" maxlength="10"
             onkeydown="if(event.key==='Enter') modalOk()">
    </div>
    <div class="modal-field">
      <div class="modal-label">색상</div>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn modal-btn-ok" onclick="modalOk()">확인</button>
    </div>
  </div>
</div>

<script>
const DAYS_5 = ['월','화','수','목','금'];
const DAYS_6 = ['월','화','수','목','금','토'];
const DEFAULT_TIMES = [
  ['09:00','09:40'],['09:50','10:30'],['10:40','11:20'],
  ['11:30','12:10'],['13:00','13:40'],['13:50','14:30'],
  ['14:40','15:20'],['15:30','16:10']
];
const COLORS = [
  {bg:'#4a7fcb',text:'#fff'},{bg:'#5aab86',text:'#fff'},
  {bg:'#e07a5f',text:'#fff'},{bg:'#9b72d0',text:'#fff'},
  {bg:'#d4a017',text:'#fff'},{bg:'#3aacb8',text:'#fff'},
  {bg:'#c25f8a',text:'#fff'},{bg:'#6a9e3c',text:'#fff'},
  {bg:'#e0956a',text:'#fff'},{bg:'#4a8fa0',text:'#fff'},
  {bg:'#b85858',text:'#fff'},{bg:'#7a82c8',text:'#fff'},
];

let schedule = {}, modalTarget = null, selectedColorIdx = 0;

window.onload = () => { buildPeriodTimes(); buildGrid(); buildColorGrid(); };

function getDays() {
  return parseInt(document.getElementById('dayCount').value) === 6 ? DAYS_6 : DAYS_5;
}
function getPeriods() { return parseInt(document.getElementById('periodCount').value); }

function buildPeriodTimes() {
  const c = document.getElementById('periodTimes');
  c.innerHTML = '';
  for (let p = 1; p <= 8; p++) {
    const row = document.createElement('div');
    row.className = 'period-row'; row.id = `ptrow-${p}`;
    row.innerHTML = `<span class="period-num">${p}</span>
      <input class="time-input" id="ts-${p}" type="time" value="${DEFAULT_TIMES[p-1][0]}">
      <input class="time-input" id="te-${p}" type="time" value="${DEFAULT_TIMES[p-1][1]}">`;
    c.appendChild(row);
  }
  syncPV();
}
function syncPV() {
  const n = getPeriods();
  for (let p = 1; p <= 8; p++) {
    const r = document.getElementById(`ptrow-${p}`);
    if (r) r.style.display = p <= n ? '' : 'none';
  }
}
function getTime(p) {
  return { s: document.getElementById(`ts-${p}`)?.value||'', e: document.getElementById(`te-${p}`)?.value||'' };
}

function buildGrid() {
  syncPV();
  const days = getDays(), periods = getPeriods();
  const table = document.getElementById('timetable');
  table.innerHTML = '';
  const thead = table.createTHead(), hr = thead.insertRow();
  const th0 = document.createElement('th'); th0.className='period-head'; th0.textContent='교시'; hr.appendChild(th0);
  days.forEach(d => { const th=document.createElement('th'); th.className='day-head'; th.textContent=d; hr.appendChild(th); });

  const tbody = table.createTBody();
  for (let p = 1; p <= periods; p++) {
    const tr = tbody.insertRow();
    const td0 = tr.insertCell(); td0.className = 'period-info';
    const {s,e} = getTime(p);
    td0.innerHTML = `<span class="period-label">${p}교시</span><span class="period-time">${s}<br>${e}</span>`;
    days.forEach((d, di) => {
      const td = tr.insertCell();
      td.appendChild(buildCell(`${di}-${p}`, d, p));
    });
  }
  updateLegend();
}

function buildCell(key, day, period) {
  const div = document.createElement('div');
  const data = schedule[key];
  if (data) {
    const col = COLORS[data.colorIdx];
    div.className = 'cell-inner filled';
    div.style.background = col.bg; div.style.color = col.text;
    div.innerHTML = `<span class="subject-name">${data.subject}</span>
      <span class="cell-del" onclick="delCell(event,'${key}')">✕</span>`;
    div.onclick = e => { if(e.target.classList.contains('cell-del')) return; openModal(key,day,period,data); };
  } else {
    div.className = 'cell-inner empty';
    div.innerHTML = `<span class="add-icon">+</span>`;
    div.onclick = () => openModal(key, day, period, null);
  }
  return div;
}

function buildColorGrid() {
  const grid = document.getElementById('colorGrid'); grid.innerHTML = '';
  COLORS.forEach((c,i) => {
    const btn = document.createElement('div');
    btn.className = 'color-opt'+(i===0?' selected':'');
    btn.style.background = c.bg; btn.dataset.idx = i;
    btn.onclick = () => selectColor(i);
    grid.appendChild(btn);
  });
}
function selectColor(idx) {
  selectedColorIdx = idx;
  document.querySelectorAll('.color-opt').forEach(el => el.classList.toggle('selected', parseInt(el.dataset.idx)===idx));
}
function nextColorIdx() {
  const used = Object.values(schedule).map(v=>v.colorIdx);
  for (let i=0;i<COLORS.length;i++) if(!used.includes(i)) return i;
  return 0;
}

function openModal(key, day, period, existing) {
  modalTarget = key;
  document.getElementById('modalContext').textContent = `${day}요일 · ${period}교시`;
  document.getElementById('modalSubject').value = existing ? existing.subject : '';
  selectColor(existing ? existing.colorIdx : nextColorIdx());
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('modalSubject').focus(), 50);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); modalTarget=null; }
function handleOverlayClick(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }
function modalOk() {
  const subject = document.getElementById('modalSubject').value.trim();
  if (!subject) { closeModal(); return; }
  schedule[modalTarget] = { subject, colorIdx: selectedColorIdx };
  closeModal(); buildGrid(); updateLegend();
}
function delCell(e, key) { e.stopPropagation(); delete schedule[key]; buildGrid(); updateLegend(); }

function updateLegend() {
  const legend = document.getElementById('legend');
  const subjects = {};
  Object.values(schedule).forEach(v => { subjects[v.subject]=v.colorIdx; });
  const entries = Object.entries(subjects);
  if (!entries.length) {
    legend.innerHTML = '<div style="font-size:11px;color:var(--text-faint);">셀을 클릭해 과목을 입력하세요</div>';
    return;
  }
  legend.innerHTML = entries.map(([s,ci]) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${COLORS[ci].bg}"></div><span>${s}</span></div>`
  ).join('');
}

function updateHeader() {
  const school = document.getElementById('schoolName').value.trim();
  const cls = document.getElementById('className').value.trim();
  const teacher = document.getElementById('teacherName').value.trim();
  const sem = document.getElementById('semester').value.trim();
  document.getElementById('ttTitle').textContent = [school,cls].filter(Boolean).join(' ') || '수업 시간표';
  document.getElementById('ttMeta').textContent = [teacher?`담임 ${teacher}`:'',sem].filter(Boolean).join(' · ');
}

function clearAll() {
  if (!confirm('시간표를 초기화하시겠습니까?')) return;
  schedule = {}; buildGrid();
}
</script>
</body>
</html>
