<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가정통신문 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f6fa;
  --surface: #ffffff;
  --surface2: #f0f2f8;
  --border: #dde1ec;
  --border-light: #e8ebf5;
  --text: #1e2240;
  --text-dim: #6b7194;
  --text-faint: #b0b5cc;
  --accent: #3d5afe;
  --accent-light: #e8ecff;
  --accent-hover: #2a45e8;
  --success: #2e7d52;
  --success-bg: #edf7f1;
  --warn: #b45309;
  --warn-bg: #fef3e2;
  --red: #c0392b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: 320px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 28px 22px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.brand { border-bottom: 1px solid var(--border-light); padding-bottom: 20px; }
.brand .tag {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 8px;
}
.brand h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px;
  font-weight: 700;
  line-height: 1.5;
  color: var(--text);
}

.s-section { display: flex; flex-direction: column; gap: 10px; }
.s-label {
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--text-faint);
  text-transform: uppercase;
  font-weight: 600;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-light);
}
.s-row-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
  font-weight: 500;
}

.s-input, .s-select, .s-textarea {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 10px;
  border-radius: 6px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.s-input:focus, .s-select:focus, .s-textarea:focus {
  border-color: var(--accent);
  background: #fff;
}
.s-textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.7;
}
.s-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* API key field */
.api-row { position: relative; }
.api-row .s-input { padding-right: 70px; font-size: 12px; }
.api-toggle {
  position: absolute;
  right: 8px; top: 50%; transform: translateY(-50%);
  font-size: 11px;
  color: var(--text-faint);
  cursor: pointer;
  user-select: none;
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.api-toggle:hover { color: var(--accent); }

/* type chips */
.type-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.type-chip {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 6px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  white-space: nowrap;
}
.type-chip:hover { border-color: var(--accent); color: var(--accent); }
.type-chip.active {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 600;
}

/* tone chips */
.tone-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tone-chip {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.tone-chip:hover { border-color: var(--accent); color: var(--accent); }
.tone-chip.active {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 600;
}

/* buttons */
.btn {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 12px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-accent:disabled { background: var(--text-faint); cursor: not-allowed; }
.btn-ghost {
  background: var(--surface2);
  color: var(--text-dim);
  border: 1px solid var(--border);
  font-size: 13px;
  font-weight: 500;
  padding: 9px 14px;
}
.btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
.btn-group { display: flex; flex-direction: column; gap: 8px; }

/* ─── MAIN ─── */
.main {
  flex: 1;
  padding: 32px 40px;
  overflow: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* status bar */
.status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  display: none;
}
.status-bar.info { background: var(--accent-light); color: var(--accent); display: flex; }
.status-bar.success { background: var(--success-bg); color: var(--success); display: flex; }
.status-bar.error { background: #fef2f2; color: var(--red); display: flex; }

/* spinner */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* preview card */
.preview-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(61,90,254,0.06);
  flex: 1;
}

.preview-toolbar {
  padding: 14px 22px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(135deg, #f7f9ff 0%, #fff 100%);
}
.preview-toolbar-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.preview-toolbar-actions { display: flex; gap: 8px; }
.toolbar-btn {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.13s;
}
.toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }
.toolbar-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.toolbar-btn.primary:hover { background: var(--accent-hover); }

/* document area */
.doc-wrap {
  padding: 40px 56px;
  min-height: 600px;
}

/* 편집 가능한 출력 */
.doc-output {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  line-height: 2;
  color: var(--text);
  outline: none;
  white-space: pre-wrap;
  min-height: 500px;
  word-break: keep-all;
}
.doc-output:focus {
  background: #fdfeff;
  border-radius: 4px;
}

/* placeholder */
.doc-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 500px;
  color: var(--text-faint);
  text-align: center;
  gap: 14px;
}
.doc-placeholder .icon { font-size: 48px; opacity: 0.5; }
.doc-placeholder p { font-size: 14px; line-height: 1.8; }

/* ─── PRINT ─── */
@media print {
  body { background: white; }
  .sidebar, .preview-toolbar, .status-bar { display: none !important; }
  .app { display: block; }
  .main { padding: 0; }
  .preview-card { border: none; box-shadow: none; border-radius: 0; }
  .doc-wrap { padding: 20px; }
  .doc-output { font-size: 13pt; line-height: 2.2; }
}
</style>
</head>
<body>
<div class="app">

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="brand">
    <div class="tag">교컴 · 교사 도구</div>
    <h1>가정통신문<br>생성기</h1>
  </div>

  <!-- API 키 -->
  <div class="s-section">
    <div class="s-label">API 설정</div>
    <div>
      <div class="s-row-label">Anthropic API Key</div>
      <div class="api-row">
        <input class="s-input" id="apiKey" type="password" placeholder="sk-ant-...">
        <span class="api-toggle" onclick="toggleApiVis()">보기</span>
      </div>
    </div>
  </div>

  <!-- 학교/학급 정보 -->
  <div class="s-section">
    <div class="s-label">학급 정보</div>
    <div class="s-row">
      <div>
        <div class="s-row-label">학교명</div>
        <input class="s-input" id="schoolName" placeholder="○○초등학교">
      </div>
      <div>
        <div class="s-row-label">학년 · 반</div>
        <input class="s-input" id="className" placeholder="3학년 2반">
      </div>
    </div>
    <div class="s-row">
      <div>
        <div class="s-row-label">담임 교사</div>
        <input class="s-input" id="teacherName" placeholder="홍길동">
      </div>
      <div>
        <div class="s-row-label">날짜</div>
        <input class="s-input" id="docDate" type="date">
      </div>
    </div>
  </div>

  <!-- 통신문 유형 -->
  <div class="s-section">
    <div class="s-label">통신문 유형</div>
    <div class="type-grid" id="typeGrid">
      <div class="type-chip active" data-type="학기초 안내">📋 학기초 안내</div>
      <div class="type-chip" data-type="현장학습 안내">🚌 현장학습</div>
      <div class="type-chip" data-type="방학 안내">☀️ 방학 안내</div>
      <div class="type-chip" data-type="학부모 상담 안내">💬 학부모 상담</div>
      <div class="type-chip" data-type="건강·안전 안내">🏥 건강·안전</div>
      <div class="type-chip" data-type="행사 안내">🎉 행사 안내</div>
    </div>
  </div>

  <!-- 주요 내용 -->
  <div class="s-section">
    <div class="s-label">주요 내용</div>
    <div>
      <div class="s-row-label">제목 또는 행사명</div>
      <input class="s-input" id="titleInput" placeholder="예: 2025학년도 1학기 학급 안내">
    </div>
    <div>
      <div class="s-row-label">핵심 내용 (키워드나 메모)</div>
      <textarea class="s-textarea" id="keyContent" placeholder="예:
• 담임 인사
• 학급 규칙: 존중·약속·책임
• 준비물: 실내화, 미술 도구
• 상담 신청: 3/14까지"></textarea>
    </div>
    <div>
      <div class="s-row-label">추가 요청사항 (선택)</div>
      <input class="s-input" id="extraRequest" placeholder="예: 학부모 회의 3/20 안내 포함">
    </div>
  </div>

  <!-- 문체 -->
  <div class="s-section">
    <div class="s-label">문체 설정</div>
    <div class="tone-row" id="toneRow">
      <div class="tone-chip active" data-tone="정중하고 따뜻한">정중·따뜻</div>
      <div class="tone-chip" data-tone="간결하고 명확한">간결·명확</div>
      <div class="tone-chip" data-tone="친근하고 부드러운">친근·부드러움</div>
      <div class="tone-chip" data-tone="공식적이고 격식 있는">공식·격식</div>
    </div>
  </div>

  <!-- 생성 버튼 -->
  <div class="btn-group">
    <button class="btn btn-accent" id="generateBtn" onclick="generate()">
      ✨ 가정통신문 생성
    </button>
    <button class="btn btn-ghost" onclick="clearAll()">초기화</button>
  </div>
</aside>

<!-- ══ MAIN ══ -->
<main class="main">

  <div class="status-bar" id="statusBar">
    <div class="spinner" id="statusSpinner" style="display:none"></div>
    <span id="statusText"></span>
  </div>

  <div class="preview-card">
    <div class="preview-toolbar">
      <div class="preview-toolbar-title">미리보기 · 편집</div>
      <div class="preview-toolbar-actions">
        <button class="toolbar-btn" onclick="copyText()">📋 복사</button>
        <button class="toolbar-btn primary" onclick="window.print()">🖨 인쇄 / PDF</button>
      </div>
    </div>
    <div class="doc-wrap">
      <div id="docOutput"></div>
    </div>
  </div>

</main>
</div>

<script>
// ── 초기화 ──────────────────────────────────────────────────────
document.getElementById('docDate').value = new Date().toISOString().split('T')[0];
showPlaceholder();

// ── 유형 선택 ───────────────────────────────────────────────────
document.querySelectorAll('.type-chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  };
});

document.querySelectorAll('.tone-chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.tone-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  };
});

// ── API 키 보기/숨기기 ──────────────────────────────────────────
function toggleApiVis() {
  const inp = document.getElementById('apiKey');
  const btn = document.querySelector('.api-toggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '숨기기'; }
  else { inp.type = 'password'; btn.textContent = '보기'; }
}

// ── Placeholder ─────────────────────────────────────────────────
function showPlaceholder() {
  document.getElementById('docOutput').innerHTML = `
    <div class="doc-placeholder">
      <div class="icon">📄</div>
      <p>왼쪽에서 정보를 입력하고<br><strong>가정통신문 생성</strong> 버튼을 눌러주세요.<br><br>
      생성된 통신문은 여기서 직접 수정도 가능합니다.</p>
    </div>`;
}

// ── 날짜 포맷 ───────────────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

// ── 상태 표시 ───────────────────────────────────────────────────
function setStatus(type, msg, loading=false) {
  const bar = document.getElementById('statusBar');
  const text = document.getElementById('statusText');
  const spinner = document.getElementById('statusSpinner');
  bar.className = `status-bar ${type}`;
  text.textContent = msg;
  spinner.style.display = loading ? 'block' : 'none';
}
function hideStatus() {
  document.getElementById('statusBar').className = 'status-bar';
}

// ── 복사 ────────────────────────────────────────────────────────
function copyText() {
  const el = document.getElementById('docOutput');
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    setStatus('success', '클립보드에 복사되었습니다.');
    setTimeout(hideStatus, 2500);
  });
}

// ── 초기화 ──────────────────────────────────────────────────────
function clearAll() {
  document.getElementById('schoolName').value = '';
  document.getElementById('className').value = '';
  document.getElementById('teacherName').value = '';
  document.getElementById('docDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('titleInput').value = '';
  document.getElementById('keyContent').value = '';
  document.getElementById('extraRequest').value = '';
  document.querySelectorAll('.type-chip').forEach((c,i) => c.classList.toggle('active', i===0));
  document.querySelectorAll('.tone-chip').forEach((c,i) => c.classList.toggle('active', i===0));
  showPlaceholder();
  hideStatus();
}

// ── 생성 ────────────────────────────────────────────────────────
async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { setStatus('error', 'API 키를 입력해 주세요.'); return; }

  const school = document.getElementById('schoolName').value.trim() || '○○학교';
  const cls = document.getElementById('className').value.trim() || '';
  const teacher = document.getElementById('teacherName').value.trim() || '';
  const date = formatDate(document.getElementById('docDate').value);
  const title = document.getElementById('titleInput').value.trim();
  const keyContent = document.getElementById('keyContent').value.trim();
  const extra = document.getElementById('extraRequest').value.trim();
  const type = document.querySelector('.type-chip.active')?.dataset.type || '학기초 안내';
  const tone = document.querySelector('.tone-chip.active')?.dataset.tone || '정중하고 따뜻한';

  if (!keyContent) { setStatus('error', '주요 내용을 입력해 주세요.'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '생성 중...';
  setStatus('info', 'Claude가 가정통신문을 작성하고 있습니다...', true);

  const systemPrompt = `당신은 초·중·고등학교 담임 교사를 돕는 가정통신문 작성 전문가입니다.
한국 학교 문화에 맞는 자연스럽고 완성도 높은 가정통신문을 작성합니다.

작성 원칙:
- 문체: ${tone} 문체로 작성
- 형식: 한국 학교 가정통신문 표준 형식 준수
- 제목은 크고 명확하게
- 인사말 → 본문 → 협조 요청 → 마무리 인사 구조
- 번호나 글머리 기호를 활용해 내용을 명확히 전달
- 담임 서명란 포함
- 마크다운 문법 없이 순수 텍스트로만 작성 (**, ## 등 사용 금지)
- 불필요한 반복이나 과도한 미사여구 없이 실용적으로 작성`;

  const userPrompt = `다음 정보를 바탕으로 가정통신문을 작성해 주세요.

학교: ${school}
학급: ${cls}
담임: ${teacher}
날짜: ${date}
통신문 유형: ${type}
제목/행사명: ${title || type}
주요 내용:
${keyContent}
${extra ? `추가 요청: ${extra}` : ''}

완성된 가정통신문 전문을 작성해 주세요. 순수 텍스트로만 작성하고, 마크다운 기호는 사용하지 마세요.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `API 오류 (${res.status})`);
    }

    const data = await res.json();
    const text = data.content?.[0]?.text || '';

    // 출력: 편집 가능한 div
    const docOutput = document.getElementById('docOutput');
    docOutput.innerHTML = `<div class="doc-output" contenteditable="true" spellcheck="false">${escapeHtml(text)}</div>`;

    setStatus('success', '가정통신문이 생성되었습니다. 내용을 직접 수정할 수 있습니다.');
    setTimeout(hideStatus, 4000);

  } catch (e) {
    setStatus('error', `오류: ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ 가정통신문 생성';
  }
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}
</script>
