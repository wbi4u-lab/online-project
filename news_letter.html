<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가정통신문 생성기 (템플릿)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f6fa;
  --surface: #fff;
  --surface2: #f0f2f8;
  --border: #dde1ec;
  --border-light: #eaedf6;
  --text: #1e2240;
  --text-dim: #6b7194;
  --text-faint: #b0b5cc;
  --accent: #3d5afe;
  --accent-light: #e8ecff;
  --accent-hover: #2a45e8;
  --green: #2e7d52;
  --green-bg: #edf7f1;
  --blank: #fff3cd;
  --blank-border: #e8a900;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}
.app { display: flex; min-height: 100vh; }

/* ══ SIDEBAR ══ */
.sidebar {
  width: 310px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-top {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}
.brand-tag { font-size: 10px; letter-spacing: 2px; color: var(--accent); font-weight: 600; text-transform: uppercase; margin-bottom: 6px; }
.brand-title { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.4; }

.sidebar-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 18px; }

.s-block { display: flex; flex-direction: column; gap: 8px; }
.s-label {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  color: var(--text-faint); text-transform: uppercase;
  border-bottom: 1px solid var(--border-light); padding-bottom: 5px;
}
.s-row-label { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-bottom: 3px; }

.s-input, .s-select {
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 10px; border-radius: 6px;
  width: 100%; outline: none; transition: border-color 0.15s, background 0.15s;
}
.s-input:focus, .s-select:focus { border-color: var(--accent); background: #fff; }
.s-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* 유형 칩 */
.type-chips { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.type-chip {
  font-size: 12px; font-weight: 500; padding: 8px 6px;
  border-radius: 7px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text-dim);
  cursor: pointer; text-align: center; transition: all 0.13s; line-height: 1.3;
}
.type-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.type-chip.on { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 700; }

/* 문구 팔레트 */
.palette-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.ptab {
  font-size: 11px; font-weight: 500; padding: 4px 10px;
  border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text-dim);
  cursor: pointer; transition: all 0.13s;
}
.ptab:hover { border-color: var(--accent); color: var(--accent); }
.ptab.on { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }

.phrase-list { display: flex; flex-direction: column; gap: 5px; max-height: 260px; overflow-y: auto; }
.phrase-item {
  font-size: 12px; line-height: 1.6; padding: 8px 10px;
  border-radius: 6px; border: 1px solid var(--border-light);
  background: var(--surface2); color: var(--text-dim);
  cursor: pointer; transition: all 0.13s;
}
.phrase-item:hover { border-color: var(--accent); color: var(--text); background: var(--accent-light); }
.phrase-hint { font-size: 11px; color: var(--text-faint); line-height: 1.6; }

/* 버튼 */
.sidebar-bottom { padding: 14px 20px; border-top: 1px solid var(--border-light); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.btn {
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600;
  padding: 10px 16px; border: none; border-radius: 7px; cursor: pointer;
  transition: all 0.15s; width: 100%; text-align: center;
}
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-ghost { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); font-weight: 500; }
.btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
.btn-row { display: flex; gap: 8px; }
.btn-row .btn { font-size: 12px; padding: 8px 10px; }

/* ══ MAIN ══ */
.main { flex: 1; padding: 28px 36px; overflow: auto; display: flex; flex-direction: column; gap: 14px; }

.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 18px;
  box-shadow: 0 1px 6px rgba(61,90,254,0.04);
}
.toolbar-left { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; color: var(--text); }
.toolbar-right { display: flex; gap: 8px; }
.tbtn {
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 500;
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); color: var(--text-dim); cursor: pointer; transition: all 0.13s;
}
.tbtn:hover { border-color: var(--accent); color: var(--accent); }
.tbtn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.tbtn.primary:hover { background: var(--accent-hover); }

/* 빈칸 안내 */
.blank-notice {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-radius: 7px;
  background: var(--blank); border: 1px solid var(--blank-border);
  font-size: 12px; color: #7a5800; font-weight: 500;
}

/* 문서 */
.doc-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 2px 14px rgba(61,90,254,0.06); overflow: hidden; flex: 1;
}
.doc-inner { padding: 48px 60px; min-height: 640px; }

/* 가정통신문 문서 스타일 */
.doc-area {
  font-family: 'Noto Serif KR', serif;
  font-size: 14.5px;
  line-height: 2;
  color: #1a1a2e;
  outline: none;
  min-height: 560px;
  word-break: keep-all;
}
.doc-area:focus { outline: none; }

/* 빈칸 강조 */
.doc-area .blank {
  background: var(--blank);
  border-bottom: 2px solid var(--blank-border);
  border-radius: 2px;
  padding: 0 3px;
  color: #7a5800;
  cursor: text;
  white-space: nowrap;
}

/* 인쇄 */
@media print {
  body { background: white; }
  .sidebar, .toolbar, .blank-notice { display: none !important; }
  .app { display: block; }
  .main { padding: 0; gap: 0; }
  .doc-card { border: none; box-shadow: none; border-radius: 0; }
  .doc-inner { padding: 20px 28px; }
  .doc-area { font-size: 13pt; line-height: 2.2; }
  .blank { background: none !important; border-bottom: 1px solid #999 !important; color: #333 !important; }
}
</style>
</head>
<body>
<div class="app">

<!-- ══════════ SIDEBAR ══════════ -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="brand-tag">교컴 · 교사 도구</div>
    <div class="brand-title">가정통신문<br>생성기 (템플릿)</div>
  </div>

  <div class="sidebar-scroll">

    <!-- 학교 정보 -->
    <div class="s-block">
      <div class="s-label">학급 정보</div>
      <div class="s-grid">
        <div>
          <div class="s-row-label">학교명</div>
          <input class="s-input" id="iSchool" placeholder="○○초등학교" oninput="syncInfo()">
        </div>
        <div>
          <div class="s-row-label">학년 · 반</div>
          <input class="s-input" id="iClass" placeholder="3학년 2반" oninput="syncInfo()">
        </div>
        <div>
          <div class="s-row-label">담임</div>
          <input class="s-input" id="iTeacher" placeholder="홍길동" oninput="syncInfo()">
        </div>
        <div>
          <div class="s-row-label">날짜</div>
          <input class="s-input" id="iDate" type="date" oninput="syncInfo()">
        </div>
        <div style="grid-column:1/-1">
          <div class="s-row-label">연락처</div>
          <input class="s-input" id="iPhone" placeholder="학교 전화번호" oninput="syncInfo()">
        </div>
      </div>
    </div>

    <!-- 통신문 유형 -->
    <div class="s-block">
      <div class="s-label">통신문 유형</div>
      <div class="type-chips" id="typeChips">
        <div class="type-chip on" data-t="semester">📋 학기초 안내</div>
        <div class="type-chip" data-t="trip">🚌 현장학습</div>
        <div class="type-chip" data-t="vacation">☀️ 방학 안내</div>
        <div class="type-chip" data-t="consult">💬 학부모 상담</div>
        <div class="type-chip" data-t="health">🏥 건강·안전</div>
        <div class="type-chip" data-t="event">🎉 행사 안내</div>
      </div>
      <button class="btn btn-accent" style="margin-top:4px" onclick="loadTemplate()">이 유형으로 불러오기</button>
    </div>

    <!-- 문구 팔레트 -->
    <div class="s-block">
      <div class="s-label">문구 팔레트</div>
      <div class="palette-tabs" id="paletteTabs">
        <div class="ptab on" data-p="greet">인사말</div>
        <div class="ptab" data-p="body">본문</div>
        <div class="ptab" data-p="request">협조요청</div>
        <div class="ptab" data-p="close">마무리</div>
      </div>
      <div class="phrase-list" id="phraseList"></div>
      <div class="phrase-hint">※ 문구를 클릭하면 커서 위치에 삽입됩니다</div>
    </div>

  </div><!-- /sidebar-scroll -->

  <div class="sidebar-bottom">
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="copyDoc()">📋 복사</button>
      <button class="btn btn-ghost" onclick="clearDoc()">초기화</button>
      <button class="btn btn-accent" onclick="window.print()">🖨 인쇄</button>
    </div>
  </div>
</aside>

<!-- ══════════ MAIN ══════════ -->
<main class="main">

  <div class="toolbar">
    <div class="toolbar-left">미리보기 · 직접 편집 가능</div>
    <div class="toolbar-right">
      <button class="tbtn" onclick="fillBlanks()">✏️ 빈칸 채우기 도우미</button>
    </div>
  </div>

  <div class="blank-notice" id="blankNotice" style="display:none">
    ⚠️ 노란색 <span class="blank" style="display:inline">[ 빈칸 ]</span> 을 클릭하거나 직접 수정해 주세요.
  </div>

  <div class="doc-card">
    <div class="doc-inner">
      <div class="doc-area" id="docArea" contenteditable="true" spellcheck="false"></div>
    </div>
  </div>

</main>
</div>

// ════════════════════════════════════════
// 상태
// ════════════════════════════════════════
let currentType = 'semester';
let currentPalette = 'greet';

// ════════════════════════════════════════
// 초기화
// ════════════════════════════════════════
window.onload = () => {
  document.getElementById('iDate').value = new Date().toISOString().split('T')[0];
  renderPhrases();
  loadTemplate();

  // 유형 칩 클릭
  document.querySelectorAll('.type-chip').forEach(c => {
    c.onclick = () => {
      document.querySelectorAll('.type-chip').forEach(x => x.classList.remove('on'));
      c.classList.add('on');
      currentType = c.dataset.t;
    };
  });

  // 팔레트 탭 클릭
  document.querySelectorAll('.ptab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.ptab').forEach(x => x.classList.remove('on'));
      t.classList.add('on');
      currentPalette = t.dataset.p;
      renderPhrases();
    };
  });
};

// ════════════════════════════════════════
// 정보 수집
// ════════════════════════════════════════
function getInfo() {
  const dateVal = document.getElementById('iDate').value;
  let dateStr = '';
  if (dateVal) {
    const d = new Date(dateVal);
    dateStr = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  }
  const now = new Date();
  const month = now.getMonth() + 1;
  return {
    school: document.getElementById('iSchool').value.trim() || '○○학교',
    cls:    document.getElementById('iClass').value.trim()  || '[학년 반]',
    teacher:document.getElementById('iTeacher').value.trim()|| '[담임 교사]',
    phone:  document.getElementById('iPhone').value.trim(),
    date:   dateStr || `${now.getFullYear()}년 ${month}월 ${now.getDate()}일`,
    year:   now.getFullYear(),
    term:   month <= 7 ? '1' : '2',
  };
}

function syncInfo() { /* 실시간 반영 없이 불러오기 버튼으로만 갱신 */ }

// ════════════════════════════════════════
// 템플릿 불러오기
// ════════════════════════════════════════
function loadTemplate() {
  const info = getInfo();
  const tmpl = TEMPLATES[currentType];
  if (!tmpl) return;
  const text = tmpl(info).trim();
  renderDoc(text);
  checkBlanks();
}

// ════════════════════════════════════════
// 문서 렌더링 (빈칸 하이라이트)
// ════════════════════════════════════════
function renderDoc(text) {
  // [  텍스트  ] 형태를 span.blank 로 변환
  const escaped = text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
  const highlighted = escaped.replace(/\[([^\]]*)\]/g, (_, inner) => {
    return `<span class="blank" contenteditable="true">[${inner}]</span>`;
  });
  const withBr = highlighted.replace(/\n/g, '<br>');
  document.getElementById('docArea').innerHTML = withBr;
}

function checkBlanks() {
  const hasBlank = document.getElementById('docArea').querySelector('.blank');
  document.getElementById('blankNotice').style.display = hasBlank ? 'flex' : 'none';
}

// ════════════════════════════════════════
// 문구 팔레트
// ════════════════════════════════════════
function renderPhrases() {
  const list = document.getElementById('phraseList');
  const phrases = PHRASES[currentPalette] || [];
  list.innerHTML = phrases.map(p =>
    `<div class="phrase-item" onclick="insertPhrase(this)">${p}</div>`
  ).join('');
}

function insertPhrase(el) {
  const text = el.textContent;
  const docArea = document.getElementById('docArea');
  docArea.focus();
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0);
    // 선택 범위가 docArea 안에 있는지 확인
    if (docArea.contains(range.commonAncestorContainer)) {
      range.deleteContents();
      const textNode = document.createTextNode(text);
      range.insertNode(textNode);
      range.setStartAfter(textNode);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
      return;
    }
  }
  // 선택 없으면 끝에 추가
  docArea.innerHTML += '<br>' + text;
  // 커서를 끝으로
  const range2 = document.createRange();
  range2.selectNodeContents(docArea);
  range2.collapse(false);
  const sel2 = window.getSelection();
  sel2.removeAllRanges();
  sel2.addRange(range2);
}

// ════════════════════════════════════════
// 빈칸 채우기 도우미
// ════════════════════════════════════════
function fillBlanks() {
  const blanks = document.getElementById('docArea').querySelectorAll('.blank');
  if (blanks.length === 0) {
    alert('채울 빈칸이 없습니다. 이미 완성된 상태입니다.');
    return;
  }
  // 첫 번째 빈칸으로 포커스
  blanks[0].focus();
  const range = document.createRange();
  range.selectNodeContents(blanks[0]);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  blanks[0].scrollIntoView({ behavior:'smooth', block:'center' });
}

// ════════════════════════════════════════
// 복사
// ════════════════════════════════════════
function copyDoc() {
  const text = document.getElementById('docArea').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '✅ 복사됨';
    setTimeout(() => btn.textContent = '📋 복사', 2000);
  });
}

// ════════════════════════════════════════
// 초기화
// ════════════════════════════════════════
function clearDoc() {
  if (!confirm('문서를 초기화하시겠습니까?')) return;
  document.getElementById('iSchool').value = '';
  document.getElementById('iClass').value = '';
  document.getElementById('iTeacher').value = '';
  document.getElementById('iPhone').value = '';
  document.getElementById('iDate').value = new Date().toISOString().split('T')[0];
  currentType = 'semester';
  document.querySelectorAll('.type-chip').forEach((c,i) => c.classList.toggle('on', i===0));
  loadTemplate();
}
</script>
